      {/* EMAIL VIEWER MODAL */}
      {selectedEmail && (
        <div onClick={() => setSelectedEmail(null)} style={{position:"fixed", inset:0, background:"rgba(0,0,0,0.7)", display:"flex", alignItems:"center", justifyContent:"center", padding:"20px", zIndex:1000}}>
          <div onClick={e=>e.stopPropagation()} style={{background:"#fff", borderRadius:"10px", padding:"0", maxWidth:"440px", width:"100%", maxHeight:"85vh", overflowY:"auto", color:"#1a1a1a"}}>
            {/* Email fejléc */}
            <div style={{padding:"20px 24px", borderBottom:"1px solid #e5e5e5", background:"#f8f8f8", borderRadius:"10px 10px 0 0"}}>
              <div style={{fontSize:"11px", color:"#888", marginBottom:"4px"}}>📧 EMAIL ELŐNÉZET</div>
              <div style={{fontSize:"16px", fontWeight:"700", color:"#1a1a1a"}}>{selectedEmail.subject}</div>
              <div style={{fontSize:"12px", color:"#666", marginTop:"6px"}}>
                <strong>Feladó:</strong> {settings.salonName} &lt;noreply@cutnfade.hu&gt;<br/>
                <strong>Címzett:</strong> {selectedEmail.to}
              </div>
            </div>
            {/* Email törzs */}
            <div style={{padding:"24px", fontSize:"13px", lineHeight:"1.7", color:"#333", whiteSpace:"pre-wrap"}}>
              {selectedEmail.body}
            </div>
            {/* Lábléc */}
            <div style={{padding:"16px 24px", borderTop:"1px solid #e5e5e5", background:"#f8f8f8"}}>
              <div style={{fontSize:"10px", color:"#aaa", textAlign:"center", marginBottom:"12px"}}>
                Elküldve: {new Date(selectedEmail.time).toLocaleString("hu-HU")}
              </div>
              <button style={{width:"100%", padding:"12px", background:"#1a1a1a", color:"#fff", border:"none", borderRadius:"6px", fontWeight:"700", cursor:"pointer"}} onClick={() => setSelectedEmail(null)}>Bezárás</button>
            </div>
          </div>
        </div>
      )}

      {/* PAYMENT MODAL */}
      {payingBooking && (() => {
        const orig = payingBooking.price;
        const finalPrice = calcFinalPrice(orig, paymentForm.discountType, paymentForm.discountValue);
        const discount = orig - finalPrice;
        return (
          <div onClick={() => setPayingBooking(null)} style={{position:"fixed", inset:0, background:"rgba(0,0,0,0.7)", display:"flex", alignItems:"center", justifyContent:"center", padding:"20px", zIndex:1001}}>
            <div onClick={e=>e.stopPropagation()} style={{background:C.surface, borderRadius:"10px", padding:"24px", maxWidth:"380px", width:"100%", maxHeight:"85vh", overflowY:"auto", border:`1px solid ${C.border}`}}>
              <div style={{fontFamily:"'Playfair Display', serif", fontWeight:"700", fontSize:"20px", marginBottom:"4px"}}>💰 Fizetés</div>
              <div style={{fontSize:"12px", color:C.sub, marginBottom:"16px"}}>{payingBooking.clientName} · {payingBooking.service}</div>

              {/* Eredeti ár */}
              <div style={{padding:"12px", background:C.surfaceAlt, borderRadius:"6px", marginBottom:"12px", display:"flex", justifyContent:"space-between", alignItems:"center"}}>
                <span style={{fontSize:"13px", color:C.textDim}}>Eredeti ár</span>
                <span style={{fontSize:"18px", fontWeight:"700"}}>{orig.toLocaleString()} Ft</span>
              </div>

              {/* Kedvezmény típus */}
              <div style={{fontSize:"11px", color:C.sub, marginBottom:"6px", letterSpacing:"0.1em"}}>KEDVEZMÉNY</div>
              <div style={{display:"flex", gap:"4px", marginBottom:"10px"}}>
                {[
                  {id:"none", label:"Nincs"},
                  {id:"percent", label:"%"},
                  {id:"amount", label:"− Ft"},
                  {id:"final", label:"Végösszeg"},
                ].map(t => (
                  <button key={t.id} onClick={() => setPaymentForm({...paymentForm, discountType: t.id, discountValue: ""})}
                    style={{flex:1, padding:"8px 4px", borderRadius:"6px", fontSize:"11px", fontWeight:"600", cursor:"pointer",
                      border: paymentForm.discountType===t.id ? "none" : `1px solid ${C.border}`,
                      background: paymentForm.discountType===t.id ? C.accent : "transparent",
                      color: paymentForm.discountType===t.id ? C.accentText : C.text}}>{t.label}</button>
                ))}
              </div>

              {/* Kedvezmény érték input */}
              {paymentForm.discountType !== "none" && (
                <div style={{marginBottom:"12px"}}>
                  <input type="number" autoFocus style={S.input}
                    placeholder={paymentForm.discountType === "percent" ? "Kedvezmény %-ban (pl. 10)" : paymentForm.discountType === "amount" ? "Levonandó összeg Ft-ban" : "Ténylegesen fizetett összeg"}
                    value={paymentForm.discountValue}
                    onChange={e => setPaymentForm({...paymentForm, discountValue: e.target.value})} />
                </div>
              )}

              {/* Végösszeg kijelzés */}
              <div style={{padding:"14px", background: discount > 0 ? C.accent+"22" : C.surfaceAlt, borderRadius:"6px", marginBottom:"16px", border: discount > 0 ? `1px solid ${C.accent}` : "none"}}>
                {discount > 0 && (
                  <div style={{display:"flex", justifyContent:"space-between", fontSize:"11px", color:C.sub, marginBottom:"4px"}}>
                    <span>Kedvezmény</span>
                    <span style={{color:C.accent}}>−{discount.toLocaleString()} Ft {paymentForm.discountType === "percent" && `(${paymentForm.discountValue}%)`}</span>
                  </div>
                )}
                <div style={{display:"flex", justifyContent:"space-between", alignItems:"center"}}>
                  <span style={{fontSize:"13px", fontWeight:"600"}}>Fizetendő</span>
                  <span style={{fontSize:"24px", fontWeight:"800", color: discount > 0 ? C.accent : C.text}}>{finalPrice.toLocaleString()} Ft</span>
                </div>
              </div>

              {/* Fizetési mód + lezárás */}
              <div style={{fontSize:"11px", color:C.sub, marginBottom:"6px", letterSpacing:"0.1em"}}>FIZETÉSI MÓD</div>
              <div style={{display:"flex", gap:"6px"}}>
                <button style={{...S.btn, flex:1}} onClick={() => markCompleted(payingBooking.id, "cash", finalPrice)}>💵 Készpénz</button>
                <button style={{...S.btn, flex:1}} onClick={() => markCompleted(payingBooking.id, "card", finalPrice)}>💳 Kártya</button>
              </div>
              <button style={{...S.btnSec, width:"100%", marginTop:"8px"}} onClick={() => setPayingBooking(null)}>Mégse</button>
            </div>
          </div>
        );
      })()}

      {/* EDIT BOOKING MODAL */}
      {editingBooking && (() => {
        const eb = editingBooking;
        const stylistServices = getStylistServices(eb.stylistId);
        const currentSvc = getStylistService(eb.stylistId, eb.serviceId);
        return (
          <div onClick={() => setEditingBooking(null)} style={{position:"fixed", inset:0, background:"rgba(0,0,0,0.7)", display:"flex", alignItems:"center", justifyContent:"center", padding:"20px", zIndex:1001}}>
            <div onClick={e=>e.stopPropagation()} style={{background:C.surface, borderRadius:"10px", padding:"24px", maxWidth:"400px", width:"100%", maxHeight:"85vh", overflowY:"auto", border:`1px solid ${C.border}`}}>
              <div style={{fontFamily:"'Playfair Display', serif", fontWeight:"700", fontSize:"20px", marginBottom:"16px"}}>✏️ Foglalás szerkesztése</div>

              <div style={{marginBottom:"10px"}}>
                <div style={{fontSize:"11px", color:C.sub, marginBottom:"4px"}}>Barber</div>
                <select style={S.input} value={eb.stylistId} onChange={e => {
                  const newSid = +e.target.value;
                  const svcs = getStylistServices(newSid);
                  // ha az aktuális szolgáltatást nem végzi az új barber, váltsunk az elsőre
                  const stillHas = svcs.some(sv => sv.id === eb.serviceId);
                  setEditingBooking({...eb, stylistId: newSid, serviceId: stillHas ? eb.serviceId : (svcs[0]?.id || eb.serviceId)});
                }}>
                  {stylists.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                </select>
              </div>

              <div style={{marginBottom:"10px"}}>
                <div style={{fontSize:"11px", color:C.sub, marginBottom:"4px"}}>Szolgáltatás</div>
                <select style={S.input} value={eb.serviceId} onChange={e => setEditingBooking({...eb, serviceId: +e.target.value})}>
                  {stylistServices.map(s => <option key={s.id} value={s.id}>{s.name} – {s.price.toLocaleString()} Ft ({s.duration}p)</option>)}
                </select>
              </div>

              <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:"8px", marginBottom:"10px"}}>
                <div>
                  <div style={{fontSize:"11px", color:C.sub, marginBottom:"4px"}}>Dátum</div>
                  <input type="date" style={S.input} value={eb.date} onChange={e => setEditingBooking({...eb, date: e.target.value})} />
                </div>
                <div>
                  <div style={{fontSize:"11px", color:C.sub, marginBottom:"4px"}}>Időpont</div>
                  <select style={S.input} value={eb.time} onChange={e => setEditingBooking({...eb, time: e.target.value})}>
                    {HOURS_EXT.map(h => {
                      const avail = isSlotAvailable(eb.stylistId, eb.date, h, currentSvc?.duration || 30, eb.id, true) || h === eb.time;
                      const inHours = isSlotAvailable(eb.stylistId, eb.date, h, currentSvc?.duration || 30, eb.id, false);
                      return <option key={h} value={h} disabled={!avail}>{h}{!avail ? " (foglalt)" : !inHours ? " ⚠" : ""}</option>;
                    })}
                  </select>
                </div>
              </div>

              {/* Gyors csúsztatás ±15 perc */}
              <div style={{display:"flex", alignItems:"center", gap:"8px", marginBottom:"10px", padding:"10px", background:C.surfaceAlt, borderRadius:"6px"}}>
                <span style={{fontSize:"11px", color:C.sub, flex:1}}>Gyors csúsztatás:</span>
                <button style={{...S.btnSec, padding:"8px 14px", fontSize:"15px", fontWeight:"700"}} onClick={() => {
                  const idx = HOURS_EXT.indexOf(eb.time);
                  if (idx > 0) setEditingBooking({...eb, time: HOURS_EXT[idx-1]});
                }}>− 15p</button>
                <span style={{fontSize:"16px", fontWeight:"700", minWidth:"54px", textAlign:"center"}}>{eb.time}</span>
                <button style={{...S.btnSec, padding:"8px 14px", fontSize:"15px", fontWeight:"700"}} onClick={() => {
                  const idx = HOURS_EXT.indexOf(eb.time);
                  if (idx < HOURS_EXT.length-1) setEditingBooking({...eb, time: HOURS_EXT[idx+1]});
                }}>+ 15p</button>
              </div>

              <div style={{marginBottom:"16px"}}>
                <div style={{fontSize:"11px", color:C.sub, marginBottom:"4px"}}>Megjegyzés</div>
                <input style={S.input} value={eb.note} onChange={e => setEditingBooking({...eb, note: e.target.value})} placeholder="Megjegyzés" />
              </div>

              <div style={{display:"flex", gap:"6px"}}>
                <button style={{...S.btn, flex:1}} onClick={saveEditedBooking}>Mentés</button>
                <button style={S.btnSec} onClick={() => setEditingBooking(null)}>Mégse</button>
              </div>
            </div>
          </div>
        );
      })()}

      {/* Toast */}
      {toast && (
        <div style={{position:"fixed", bottom:"20px", left:"50%", transform:"translateX(-50%)", background: toast.type==="error" ? C.danger : C.accent, color: toast.type==="error" ? "#fff" : C.accentText, padding:"10px 20px", borderRadius:"4px", fontSize:"12px", fontWeight:"700", letterSpacing:"0.1em", textTransform:"uppercase", zIndex:9999, boxShadow:"0 4px 16px rgba(0,0,0,0.5)"}}>
          {toast.msg}
        </div>
      )}
    </div>
  );
}


    // Hibakezelő burok - ha valami elhasal, megmutatja a hibát ahelyett hogy kidobna
    class ErrorBoundary extends React.Component {
      constructor(props) { super(props); this.state = { error: null }; }
      static getDerivedStateFromError(error) { return { error }; }
      componentDidCatch(error, info) { console.error("Hiba:", error, info); }
      render() {
        if (this.state.error) {
          return React.createElement("div", { style: { padding: "20px", color: "#fff", fontFamily: "monospace", fontSize: "13px" } },
            React.createElement("h2", { style: { color: "#dc4a3d" } }, "⚠ Hiba történt"),
            React.createElement("p", { style: { color: "#aaa" } }, "Másold ki ezt a hibát és küldd el:"),
            React.createElement("pre", { style: { background: "#1a1a1a", padding: "12px", borderRadius: "6px", whiteSpace: "pre-wrap", color: "#f4a89f" } }, String(this.state.error?.stack || this.state.error)),
            React.createElement("button", { style: { marginTop: "12px", padding: "10px 16px", background: "#dc4a3d", color: "#fff", border: "none", borderRadius: "6px", cursor: "pointer" }, onClick: () => { try { localStorage.clear(); } catch(e){} location.reload(); } }, "🔄 Adatok törlése és újraindítás")
          );
        }
        return this.props.children;
      }
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(React.createElement(ErrorBoundary, null, React.createElement(App)));
  </script>
</body>
</html>
